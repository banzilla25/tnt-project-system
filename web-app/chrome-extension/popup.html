<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TNT Creator Scraper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0d0d14;
      --surface:  #16161f;
      --surface2: #1e1e2d;
      --surface3: #262638;
      --border:   rgba(255,255,255,0.08);
      --accent:   #7c3aed;
      --accent-l: #9d5cf6;
      --accent-d: rgba(124,58,237,0.15);
      --text:     #f0f0f8;
      --muted:    #8888a8;
      --sub:      #555570;
      --success:  #10b981;
      --warning:  #f59e0b;
      --danger:   #ef4444;
      --nano:     #06b6d4;
      --micro:    #10b981;
      --macro:    #f59e0b;
      --mega:     #ef4444;
      --radius:   10px;
      --tr:       0.15s ease;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 380px;
      min-height: 200px;
      max-height: 600px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .logo {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--accent-l));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: #fff;
      flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(124,58,237,0.4);
    }
    .header-text { flex: 1; }
    .header-text .title  { font-size: 13px; font-weight: 700; }
    .header-text .sub    { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .queue-badge {
      background: var(--accent-d);
      border: 1px solid rgba(124,58,237,0.3);
      color: var(--accent-l);
      border-radius: 99px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
    }

    /* ── Current Profile Card ── */
    .current-card {
      margin: 10px 12px 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      flex-shrink: 0;
    }
    .current-card .label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .profile-row {
      display: flex; align-items: center; gap: 10px;
    }
    .profile-avatar {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #4c1d95, #7c3aed);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; min-width: 0; }
    .profile-username { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .profile-nickname { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .profile-stats    { display: flex; gap: 10px; margin-top: 6px; }
    .stat-pill {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--muted);
    }
    .stat-pill strong { color: var(--text); font-size: 12px; }
    .tier-pill {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 99px;
      font-size: 9px; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .tier-nano  { background: rgba(6,182,212,0.12);  color: var(--nano);  border: 1px solid rgba(6,182,212,0.25); }
    .tier-micro { background: rgba(16,185,129,0.12); color: var(--micro); border: 1px solid rgba(16,185,129,0.25); }
    .tier-macro { background: rgba(245,158,11,0.12); color: var(--macro); border: 1px solid rgba(245,158,11,0.25); }
    .tier-mega  { background: rgba(239,68,68,0.12);  color: var(--mega);  border: 1px solid rgba(239,68,68,0.25); }
    .tier-under { background: rgba(239,68,68,0.12);  color: var(--danger); border: 1px solid rgba(239,68,68,0.25); }

    .btn-add {
      background: linear-gradient(135deg, var(--accent), var(--accent-l));
      color: #fff; border: none; border-radius: 8px;
      padding: 7px 12px; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all var(--tr);
      white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(124,58,237,0.4);
    }
    .btn-add:hover { opacity: 0.85; }
    .btn-add:disabled { opacity: 0.35; cursor: not-allowed; }

    .no-profile {
      font-size: 12px; color: var(--muted); text-align: center;
      padding: 14px 0; font-style: italic;
    }

    /* ── Status Messages ── */
    .status-msg {
      margin: 6px 12px 0;
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .status-msg.success { background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.2); }
    .status-msg.warning { background: rgba(245,158,11,0.1); color: var(--warning); border: 1px solid rgba(245,158,11,0.2); }
    .status-msg.error   { background: rgba(239,68,68,0.1);  color: var(--danger);  border: 1px solid rgba(239,68,68,0.2); }

    /* ── Divider ── */
    .section-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--sub); padding: 10px 14px 4px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .clear-btn {
      font-size: 10px; color: var(--danger); cursor: pointer; font-weight: 600;
      background: none; border: none;
    }
    .clear-btn:hover { opacity: 0.7; }

    /* ── Queue List ── */
    .queue-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 4px 12px 8px;
      min-height: 0;
    }
    .queue-scroll::-webkit-scrollbar { width: 4px; }
    .queue-scroll::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 99px; }

    .queue-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px; margin-bottom: 5px;
      transition: border-color var(--tr);
    }
    .queue-item.duplicate { border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.04); }
    .queue-item.rejected  { border-color: rgba(239,68,68,0.4);  background: rgba(239,68,68,0.04);  opacity: 0.7; }

    .q-num { font-size: 10px; color: var(--sub); font-weight: 700; width: 16px; text-align: center; flex-shrink: 0; }
    .q-info { flex: 1; min-width: 0; }
    .q-username { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .q-meta    { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .q-status  { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
    .q-del { background: none; border: none; color: var(--sub); cursor: pointer; font-size: 14px; padding: 2px 4px; transition: color var(--tr); }
    .q-del:hover { color: var(--danger); }

    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .dot-new      { background: var(--success); }
    .dot-duplicate{ background: var(--warning); }
    .dot-rejected { background: var(--danger); }

    .empty-queue {
      text-align: center; padding: 20px; color: var(--sub); font-size: 12px;
    }
    .empty-queue .emoji { font-size: 24px; margin-bottom: 6px; display: block; }

    /* ── Footer ── */
    .footer {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex; gap: 8px; align-items: center;
      flex-shrink: 0;
    }
    .footer-stats { flex: 1; font-size: 11px; color: var(--muted); }
    .footer-stats strong { color: var(--text); }

    .btn-send {
      background: linear-gradient(135deg, var(--accent), var(--accent-l));
      color: #fff; border: none; border-radius: 8px;
      padding: 9px 16px; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all var(--tr);
      display: flex; align-items: center; gap: 5px;
      box-shadow: 0 2px 10px rgba(124,58,237,0.4);
      white-space: nowrap;
    }
    .btn-send:hover   { opacity: 0.85; transform: translateY(-1px); }
    .btn-send:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: var(--surface3); color: var(--muted);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 12px; font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all var(--tr);
    }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo">TNT</div>
    <div class="header-text">
      <div class="title">Creator Scraper</div>
      <div class="sub">TNT Media · TikTok Profile Reader</div>
    </div>
    <div class="queue-badge" id="queue-count">0 queued</div>
  </div>

  <!-- Current Tab Profile -->
  <div id="current-section"></div>

  <!-- Status Message -->
  <div id="status-msg"></div>

  <!-- Queue Section Label -->
  <div class="section-label">
    <span>📋 Staging Queue</span>
    <button class="clear-btn" id="clear-queue">Clear All</button>
  </div>

  <!-- Queue Items -->
  <div class="queue-scroll" id="queue-list">
    <div class="empty-queue">
      <span class="emoji">👀</span>
      Open a TikTok profile and click<br/><strong>Add to Queue</strong> to start collecting creators.
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-stats" id="footer-stats">Queue is empty</div>
    <button class="btn-ghost" id="btn-refresh" title="Re-scan current tab">↺ Refresh</button>
    <button class="btn-send" id="btn-send" disabled>
      ⚡ Send to App
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
